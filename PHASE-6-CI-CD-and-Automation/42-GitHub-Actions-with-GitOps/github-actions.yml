# GitHub Actions Workflow Example for GitOps

name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker tag my-app:latest <your-dockerhub-username>/my-app:latest
          docker push <your-dockerhub-username>/my-app:latest

      - name: Update Kubernetes Manifest
        run: |
          sed -i 's|image: .*|image: <your-dockerhub-username>/my-app:latest|' deployment.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "github-actions"
          git add deployment.yaml
          git commit -m "Update image version"
          git push