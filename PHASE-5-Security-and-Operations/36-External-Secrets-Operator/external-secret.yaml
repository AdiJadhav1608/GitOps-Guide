# External Secret Example
# This file fetches secrets from an external provider (e.g., AWS Secrets Manager)

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret

metadata:
  name: my-external-secret
  namespace: default

spec:

  refreshInterval: 1h   # How often to refresh the secret

  secretStoreRef:
    name: my-secret-store      # Reference to SecretStore
    kind: SecretStore

  target:
    name: my-k8s-secret       # Name of Kubernetes Secret to be created
    creationPolicy: Owner

  data:
    - secretKey: username     # Key in Kubernetes Secret
      remoteRef:
        key: my-app-secret    # Secret name in external system
        property: username

    - secretKey: password
      remoteRef:
        key: my-app-secret
        property: password