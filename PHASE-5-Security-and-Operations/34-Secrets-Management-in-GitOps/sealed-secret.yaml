# Sealed Secret Example
# This file represents an encrypted Kubernetes secret

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret

metadata:
  name: my-secret
  namespace: default

spec:
  encryptedData:
    password: AgB1c2VybmFtZTpwYXNzd29yZAo=   # Encrypted value (example)

  template:
    metadata:
      name: my-secret
      namespace: default

    type: Opaque