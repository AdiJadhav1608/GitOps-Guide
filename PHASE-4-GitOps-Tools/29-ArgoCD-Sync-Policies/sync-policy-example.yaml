# ArgoCD Sync Policy Example
# This file demonstrates different sync policy configurations

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/example/gitops-repo.git
    targetRevision: main
    path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx

  syncPolicy:

    # Enable automated synchronization
    automated:
      prune: true        # Remove resources not present in Git
      selfHeal: true     # Fix drift automatically

    # Retry configuration (optional)
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m